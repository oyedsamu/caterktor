name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Publish to Maven Central
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Derive release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate signing secrets
        run: |
          test -n "${{ secrets.SIGNING_IN_MEMORY_KEY }}" || (echo "SIGNING_IN_MEMORY_KEY not set" && exit 1)
          test -n "${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}" || (echo "SIGNING_IN_MEMORY_KEY_PASSWORD not set" && exit 1)
          test -n "${{ secrets.MAVEN_CENTRAL_USERNAME }}" || (echo "MAVEN_CENTRAL_USERNAME not set" && exit 1)
          test -n "${{ secrets.MAVEN_CENTRAL_PASSWORD }}" || (echo "MAVEN_CENTRAL_PASSWORD not set" && exit 1)

      - name: Run full verification
        run: ./gradlew check apiCheck -Pcaterktor.version=${{ steps.version.outputs.version }}
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Publish to Maven Local (smoke test)
        run: ./gradlew publishToMavenLocal -Pcaterktor.version=${{ steps.version.outputs.version }}

      - name: Release dry run
        run: ./gradlew publishToMavenCentral --dry-run --no-configuration-cache -Pcaterktor.version=${{ steps.version.outputs.version }}
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Publish to Central Portal staging
        run: ./gradlew publishToMavenCentral --no-configuration-cache -Pcaterktor.version=${{ steps.version.outputs.version }}
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
